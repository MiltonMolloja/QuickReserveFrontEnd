<div class="relative">
  <lucide-angular
    [img]="searchIcon"
    [size]="16"
    [strokeWidth]="2"
    class="pointer-events-none absolute left-2.5 top-1/2 -translate-y-1/2 text-text-tertiary dark:text-text-dark-muted"
  />
  <input
    type="text"
    [placeholder]="placeholder()"
    class="w-full rounded-lg border border-border-light bg-card-light py-2.5 pl-9 pr-3 text-sm text-text-title placeholder:text-text-tertiary focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-border-dark dark:bg-card-dark dark:text-text-dark-title dark:placeholder:text-text-dark-muted dark:focus:border-primary dark:focus:ring-primary"
    (input)="onInput($event)"
    aria-label="Search"
  />
</div>
