<div class="flex flex-wrap items-center gap-3">
  <!-- Search input -->
  <div class="w-full sm:w-64">
    <app-search-input
      [placeholder]="'APPOINTMENTS.FILTERS.SEARCH' | translate"
      (searchChange)="searchChange.emit($event)"
    />
  </div>

  <!-- Workshop filter -->
  <div class="w-full sm:w-40">
    <app-filter-dropdown
      [icon]="icons.mapPin"
      [label]="'APPOINTMENTS.FILTERS.WORKSHOP' | translate"
      [options]="workshopOptions()"
      (filterChange)="workshopChange.emit($event)"
    />
  </div>

  <!-- Service type filter -->
  <div class="w-full sm:w-40">
    <app-filter-dropdown
      [icon]="icons.wrench"
      [label]="'APPOINTMENTS.FILTERS.SERVICE' | translate"
      [options]="serviceTypes()"
      (filterChange)="serviceChange.emit($event)"
    />
  </div>

  <!-- Date filter -->
  <div class="relative w-full sm:w-40">
    <lucide-angular
      [img]="icons.calendar"
      [size]="16"
      [strokeWidth]="2"
      class="pointer-events-none absolute left-3 top-1/2 z-10 -translate-y-1/2 text-text-tertiary dark:text-text-dark-muted"
    />
    <input
      type="date"
      class="w-full rounded-lg border border-border-light bg-card-light py-2.5 pl-9 pr-3 text-sm text-text-dark focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-border-dark dark:bg-card-dark dark:text-text-dark-tertiary dark:focus:border-primary dark:focus:ring-primary"
      [attr.aria-label]="'APPOINTMENTS.FILTERS.DATE' | translate"
      (change)="dateChange.emit($any($event.target).value)"
    />
  </div>

  <!-- Clear filters button -->
  @if (hasActiveFilters()) {
    <app-loading-button
      [label]="'APPOINTMENTS.FILTERS.CLEAR' | translate"
      [icon]="icons.x"
      variant="danger"
      (buttonClick)="clearFilters.emit()"
    />
  }
</div>
