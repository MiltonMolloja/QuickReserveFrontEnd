<div
  class="flex items-center gap-3 rounded-xl border border-border-light bg-card-light p-3.5 sm:gap-4 sm:p-5 dark:border-border-dark dark:bg-card-dark"
>
  <!-- Icon circle -->
  <div
    [class]="
      'flex h-10 w-10 shrink-0 items-center justify-center rounded-xl sm:h-12 sm:w-12 ' +
      iconBgClass()
    "
  >
    <lucide-angular [img]="icon()" [size]="20" [strokeWidth]="2" [class]="iconColorClass()" />
  </div>

  <!-- Label + Value -->
  <div>
    <p class="text-xs font-medium text-text-secondary dark:text-text-dark-secondary">
      {{ label() }}
    </p>
    <p class="text-xl font-extrabold text-text-title sm:text-2xl dark:text-text-dark-title">
      {{ value() }}
    </p>
  </div>
</div>
