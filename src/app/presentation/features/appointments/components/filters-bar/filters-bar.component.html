<div class="flex flex-wrap items-center gap-3">
  <!-- Search input -->
  <div class="w-full sm:w-64">
    <app-search-input
      [placeholder]="'APPOINTMENTS.FILTERS.SEARCH' | translate"
      [value]="searchValue()"
      [active]="!!searchValue()"
      (searchChange)="searchChange.emit($event)"
    />
  </div>

  <!-- Workshop + Service filters (side by side on mobile, individual on sm+) -->
  <div class="grid w-full grid-cols-2 gap-3 sm:contents">
    <div class="sm:w-48">
      <app-filter-dropdown
        [icon]="icons.mapPin"
        [label]="'APPOINTMENTS.FILTERS.WORKSHOP' | translate"
        [options]="workshopOptions()"
        [value]="workshopValue() !== null ? workshopValue()!.toString() : ''"
        [active]="workshopValue() !== null"
        (filterChange)="workshopChange.emit($event)"
      />
    </div>
    <div class="sm:w-48">
      <app-filter-dropdown
        [icon]="icons.wrench"
        [label]="'APPOINTMENTS.FILTERS.SERVICE' | translate"
        [options]="serviceTypes()"
        [value]="serviceValue()"
        [active]="!!serviceValue()"
        (filterChange)="serviceChange.emit($event)"
      />
    </div>
  </div>

  <!-- Date filter -->
  <div class="w-full sm:w-56">
    <app-date-picker
      [selectedDate]="selectedDate()"
      [showLabel]="false"
      (dateSelected)="dateChange.emit($event)"
      (dateCleared)="dateChange.emit('')"
    />
  </div>

  <!-- Clear filters button -->
  @if (hasActiveFilters()) {
    <app-loading-button
      [label]="'APPOINTMENTS.FILTERS.CLEAR' | translate"
      [icon]="icons.x"
      variant="danger"
      (buttonClick)="clearFilters.emit()"
    />
  }
</div>
