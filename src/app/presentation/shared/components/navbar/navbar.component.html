<nav
  class="flex flex-wrap items-center justify-between gap-3 bg-card-light px-4 py-3 shadow-sm sm:px-6 sm:py-4 dark:border-b dark:border-border-dark dark:bg-card-dark dark:shadow-none"
  role="navigation"
  [attr.aria-label]="'APP.TITLE' | translate"
>
  <!-- Logo + Title -->
  <div class="flex items-center gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-primary to-primary-gradient"
    >
      <lucide-angular [img]="icons.wrench" class="text-white" [size]="20" [strokeWidth]="2" />
    </div>
    <div>
      <h1 class="text-lg font-bold text-text-title dark:text-text-dark-title">
        {{ 'APP.TITLE' | translate }}
      </h1>
      @if (variant() === 'full') {
        <p class="hidden text-xs text-text-secondary sm:block dark:text-text-dark-secondary">
          {{ 'APP.SUBTITLE' | translate }}
        </p>
      }
    </div>
  </div>

  <!-- Nav Controls -->
  @if (variant() === 'full') {
    <!-- Right side: mobile compact + desktop icons + action -->
    <div class="flex items-center gap-3">
      <!-- Mobile compact controls (< sm) -->
      <div class="flex items-center gap-2 sm:hidden">
        <!-- Compact lang toggle: 🌐 ES -->
        <button
          type="button"
          class="flex items-center gap-1 rounded-md px-2 py-1.5 text-text-tertiary transition-colors hover:text-text-secondary dark:text-text-dark-muted dark:hover:text-text-dark-secondary"
          (click)="toggleLanguage()"
          aria-label="Toggle language"
        >
          <lucide-angular [img]="icons.globe" [size]="14" [strokeWidth]="2" />
          <span class="text-xs font-medium uppercase">{{ currentLang() }}</span>
        </button>

        <!-- Compact theme toggle: cycles light → dark → auto -->
        <button
          type="button"
          class="flex items-center justify-center rounded-md px-2 py-1.5 text-text-tertiary transition-colors hover:text-text-secondary dark:text-text-dark-muted dark:hover:text-text-dark-secondary"
          (click)="cycleTheme()"
          [attr.aria-label]="'Theme: ' + currentTheme()"
        >
          <lucide-angular [img]="currentThemeIcon()" [size]="14" [strokeWidth]="2" />
        </button>
      </div>

      <!-- Desktop icons (≥ sm) -->
      <div class="hidden items-center gap-3 sm:flex">
        <ng-content select="[navIcons]" />
      </div>

      <!-- Desktop action button (hidden on mobile, shown inline on sm+) -->
      <div class="hidden sm:block">
        <ng-content select="[navAction]" />
      </div>
    </div>

    <!-- Mobile action button (full width below nav row) -->
    <div class="w-full sm:hidden">
      <ng-content select="[navActionMobile]" />
    </div>
  } @else {
    <a
      routerLink="/appointments"
      class="text-sm font-medium text-primary transition-colors hover:text-primary-gradient"
    >
      {{ 'NAV.BACK_HOME' | translate }}
    </a>
  }
</nav>
